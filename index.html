<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngopi Dulu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#3b0764,#312e81);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating particles */
.particle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120px);
    }
}

/* Card */
.card{
    position:relative;
    width:90%;
    max-width:800px;
    padding:50px;
    border-radius:30px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:
    0 0 40px rgba(255,255,255,.08),
    0 0 100px rgba(139,92,246,.2);
    text-align:center;
}

.coffee{
    font-size:90px;
    animation:bounce 2s infinite;
    filter:drop-shadow(0 0 20px rgba(255,255,255,.4));
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

h1{
    margin-top:20px;
    color:white;
    font-size:clamp(2rem,4vw,4rem);
    line-height:1.4;
    font-weight:700;
}

.highlight{
    background:linear-gradient(90deg,#fbbf24,#fb923c);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.author{
    margin-top:30px;
    color:#d1d5db;
    font-size:18px;
    letter-spacing:2px;
}

.line{
    width:120px;
    height:4px;
    margin:25px auto;
    border-radius:20px;
    background:linear-gradient(90deg,#f59e0b,#fb923c);
}

.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:#7c3aed;
    border-radius:50%;
    filter:blur(120px);
    opacity:.3;
    z-index:-1;
}

.glow1{
    top:-100px;
    left:-100px;
}

.glow2{
    bottom:-100px;
    right:-100px;
    background:#f59e0b;
}

.quote{
    margin-top:15px;
    color:#e5e7eb;
    font-size:18px;
    opacity:.85;
}

@media(max-width:600px){
    .card{
        padding:35px 25px;
    }

    .coffee{
        font-size:70px;
    }

    .quote{
        font-size:15px;
    }
}
</style>
</head>
<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="card">
    <div class="coffee">☕</div>

    <h1>
        akan kuhadapi dunia.<br>
        tapi bentar,<br>
        <span class="highlight">ngopi dulu ya</span>
    </h1>

    <div class="line"></div>

    <p class="quote">
        Karena kadang solusi terbaik dimulai dari satu teguk kopi.
    </p>

    <div class="author">
        by fikri_oktaviano
    </div>
</div>
<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: 'PoAYtvBzHRg', // ID video YouTube
        playerVars: {
            autoplay: 1,
            controls: 0,
            loop: 1,
            playlist: 'PoAYtvBzHRg',
            modestbranding: 1
        },
        events: {
            onReady: function(event){
                event.target.playVideo();
            }
        }
    });
}
</script>
<script>
// Floating particles
for(let i=0;i<40;i++){
    let p=document.createElement('div');
    p.classList.add('particle');

    let size=Math.random()*10+5;

    p.style.width=size+'px';
    p.style.height=size+'px';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(Math.random()*10+10)+'s';
    p.style.animationDelay=Math.random()*5+'s';

    document.body.appendChild(p);
}
</script>

</body>
</html>
